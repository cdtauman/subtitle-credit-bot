name: Repository security

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tracked-secret-guard:
    name: Tracked secret and filename guard
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Scan tracked files
        run: python3 scripts/check_repository_security.py
